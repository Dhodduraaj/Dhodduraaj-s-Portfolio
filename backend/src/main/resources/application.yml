server:
  port: ${PORT:8080}

spring:
  application:
    name: portfolio-backend

  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    database-platform: org.hibernate.dialect.PostgreSQLDialect

allowed:
  origin: ${ALLOWED_ORIGIN:http://localhost:5173,http://localhost:5174}
